<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID CHEATS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0f; color: #e0e0ff; overflow-x: hidden; }
    .cosmo-bg {
      background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0') center/cover no-repeat fixed;
      position: relative;
    }
    .glow-card { transition: all 0.4s ease; border: 1px solid #6b21a8; }
    .glow-card:hover { border-color: #c026d3; box-shadow: 0 0 30px #c026d3; transform: translateY(-8px); }
    .nav-link { transition: all 0.2s; }
    .nav-link.active { color: #c026d3; border-bottom: 2px solid #c026d3; }
    .cart-slide { transform: translateX(100%); transition: transform 0.4s ease; }
    .cart-slide.open { transform: translateX(0); }
  </style>
</head>
<body class="cosmo-bg min-h-screen">

  <div id="stars" class="fixed inset-0 pointer-events-none z-10"></div>

  <!-- Top Nav -->
  <nav class="fixed top-0 w-full bg-black/90 border-b border-purple-800 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-10">
        <div class="text-3xl font-bold tracking-tighter">VOID<span class="text-purple-500">CHEATS</span></div>
        <div class="hidden md:flex gap-8 text-sm font-medium">
          <a href="#" onclick="showPage('store')" class="nav-link active" id="nav-store">Store</a>
          <a href="#" onclick="showPage('status')" class="nav-link" id="nav-status">Status</a>
          <a href="#" onclick="showPage('support')" class="nav-link" id="nav-support">Support</a>
        </div>
      </div>

      <div class="flex items-center gap-6">
        <div id="online-count" class="bg-green-500/20 text-green-400 px-4 py-1 rounded-full text-sm font-medium">284 ONLINE</div>
        
        <!-- Shopping Cart -->
        <div onclick="toggleCart()" class="relative cursor-pointer">
          <div class="text-2xl">🛒</div>
          <div id="cart-count" class="hidden absolute -top-1 -right-1 bg-purple-600 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</div>
        </div>

        <a href="https://discord.gg/loadingcheats" target="_blank" class="bg-purple-600 hover:bg-purple-500 px-6 py-2 rounded-xl font-medium">JOIN DISCORD</a>
      </div>
    </div>
  </nav>

  <!-- Pages -->
  <div id="page-store" class="pt-24 pb-20"> ... [store content same as before] </div>
  <div id="page-status" class="pt-24 pb-20 hidden"> ... [status content same as before] </div>
  <div id="page-support" class="pt-24 pb-20 hidden"> ... [support content] </div>

  <!-- Shopping Cart Slide-out -->
  <div id="cart-panel" class="cart-slide fixed top-0 right-0 h-full w-96 bg-zinc-950 border-l border-purple-600 z-50 p-6 overflow-y-auto">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-2xl font-bold">Shopping Cart</h2>
      <button onclick="toggleCart()" class="text-3xl">✕</button>
    </div>
    <div id="cart-items" class="space-y-6"></div>
    <div class="mt-10 pt-6 border-t border-purple-800">
      <div class="flex justify-between text-xl font-semibold mb-8">
        <div>Total</div>
        <div id="cart-total">$0.00</div>
      </div>
      <button onclick="checkout()" class="w-full bg-purple-600 hover:bg-purple-500 py-5 rounded-2xl font-medium">CHECKOUT</button>
    </div>
  </div>

  <script>
    let cart = [];

    function toggleCart() {
      document.getElementById('cart-panel').classList.toggle('open');
    }

    function addToCart(game, plan, price) {
      cart.push({game, plan, price});
      updateCartCount();
      alert(`Added to cart: ${game} - ${plan} ($${price})`);
    }

    function updateCartCount() {
      const countEl = document.getElementById('cart-count');
      countEl.textContent = cart.length;
      countEl.classList.toggle('hidden', cart.length === 0);
    }

    function updateCartDisplay() {
      let html = '';
      let total = 0;
      cart.forEach((item, index) => {
        total += item.price;
        html += `
          <div class="flex justify-between bg-zinc-900 p-4 rounded-2xl">
            <div>
              <div class="font-medium">${item.game}</div>
              <div class="text-sm text-purple-400">${item.plan}</div>
            </div>
            <div class="text-right">
              <div>$${item.price}</div>
            </div>
          </div>`;
      });
      document.getElementById('cart-items').innerHTML = html || '<p class="text-gray-500 text-center py-8">Cart is empty</p>';
      document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
    }

    function checkout() {
      if (cart.length === 0) return alert("Cart is empty");
      alert("Thank you for your purchase at VOID CHEATS!\n\n(Real checkout coming soon)");
      cart = [];
      updateCartCount();
      toggleCart();
    }

    // Rest of your existing functions (showOptions, showPage, filterGames, etc.) stay the same as the last version

    // Initialize
    showPage('store');
    updateCartCount();
  </script>
</body>
</html>
